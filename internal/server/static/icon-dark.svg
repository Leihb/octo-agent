<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3c"/>
      <stop offset="100%" style="stop-color:#1c1c1e"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>

  <!-- Octopus head -->
  <ellipse cx="50" cy="42" rx="14" ry="12" fill="#ffffff" opacity="0.95"/>

  <!-- Eyes -->
  <circle cx="45" cy="40" r="3" fill="#1c1c1e"/>
  <circle cx="55" cy="40" r="3" fill="#1c1c1e"/>

  <!-- Tentacles -->
  <path d="M 38,52 Q 32,62 30,72" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.95"/>
  <path d="M 44,54 Q 42,66 40,76" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.95"/>
  <path d="M 50,54 Q 50,66 50,76" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.95"/>
  <path d="M 56,54 Q 58,66 60,76" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.95"/>
  <path d="M 62,52 Q 68,62 70,72" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.95"/>
</svg>